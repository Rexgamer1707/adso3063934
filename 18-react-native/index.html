<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Black Clover Figma Index</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #2a0c08, #9f860a);
            color: #111;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: repeating-linear-gradient(45deg,
                    rgba(0, 0, 0, 0.08) 0px,
                    rgba(0, 0, 0, 0.08) 40px,
                    transparent 40px,
                    transparent 90px);
            opacity: 0.35;
            pointer-events: none;
        }

        .home-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 24px;
            z-index: 5;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        .logo {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 6px solid rgba(255, 255, 255, 0.7);
            overflow: hidden;
            margin-bottom: 30px;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .menu {
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .menu button {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            border: none;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.55);
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.25s ease, background 0.25s ease;
        }

        .menu button:hover {
            transform: translateX(8px) scale(1.03);
            background: rgba(255, 255, 255, 0.8);
        }

        .number {
            background: #2d014d;
            color: white;
            padding: 10px 14px;
            border-radius: 999px;
            min-width: 48px;
            text-align: center;
            font-weight: bold;
        }

        .viewer {
            width: 90%;
            max-width: 1200px;
            height: 700px;
            margin-top: 35px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
            background: white;
            display: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>
    <a href="#" class="home-btn"></a>

    <div class="container">
        <h1>01 - Black Clover</h1>
        <p class="subtitle">Galería interactiva de archivos Figma</p>

        <div class="logo">
            <img src="/imgs/newblackclover.webp" alt="Black Clover">
        </div>

        <div class="menu">
            <button
                onclick="openFile('https://embed.figma.com/design/KrvqAVHxilIkrONbU073A6/Wireframe-black-nodejs?node-id=0-1&embed-host=share')">
                <span class="number">01</span> Wireframe and Mockup
            </button>
            <button
                onclick="openFile('https://embed.figma.com/proto/KrvqAVHxilIkrONbU073A6/Wireframe-black-nodejs?node-id=1-2&p=f&scaling=scale-down&content-scaling=fixed&page-id=0%3A1&starting-point-node-id=1%3A2&embed-host=share')">
                <span class="number">02</span> Prototype 1
            </button>
            <button
                onclick="openFile('https://embed.figma.com/design/pvHRQN86FePMswGnqvJXzn/Style-Guide?node-id=0-1&embed-host=share')">
                <span class="number">03</span> Style Guide 
            </button>
            <button
                onclick="openFile('https://embed.figma.com/proto/KrvqAVHxilIkrONbU073A6/Wireframe-black-nodejs?node-id=84-3&scaling=scale-down&content-scaling=fixed&page-id=84%3A2&starting-point-node-id=84%3A3&embed-host=share')">
                <span class="number">04</span> Prototype 2
            </button>
        </div>

        <div class="viewer" id="viewer">
            <iframe id="figmaFrame"></iframe>
        </div>
    </div>

    <script>
        function openFile(url) {
            document.getElementById('figmaFrame').src = url;
            document.getElementById('viewer').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>

</html>
